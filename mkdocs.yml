site_name: FujiNet Documentation
site_url: https://benjamink.github.io/fujinet-mkdocs/
site_description: User documentation for FujiNet — the Wi-Fi network adapter for vintage computers
site_author: The FujiNet Community
repo_url: https://github.com/benjamink/fujinet-mkdocs
repo_name: benjamink/fujinet-mkdocs
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/fujinet-graphic-black.png # assets/fujinet-logo.png
  favicon: assets/fujinet-graphic-black.png # assets/fujinet-logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      accent: yellow
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      accent: yellow
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - tags
  - with-pdf:
      # Only generate PDF during production builds.
      # Locally: ENABLE_PDF_EXPORT=1 mkdocs build
      # In CI:   env var set automatically (see .github/workflows/docs.yml)
      enabled_if_env: ENABLE_PDF_EXPORT
      #
      # Document metadata
      author: The FujiNet Community
      cover_title: FujiNet Documentation
      cover_subtitle: The Wi-Fi Network Adapter for Vintage Computers
      cover_logo: assets/fujinet-graphic-black.png
      back_cover: false
      #
      # Table of contents
      toc_title: Table of Contents
      toc_level: 2
      ordered_chapter_level: 2
      #
      # Output
      output_path: pdf/fujinet-documentation.pdf
      #
      # Exclude index/navigation stub pages that don't render well in print
      exclude_pages:
        - index.md
        - getting-started/index.md
        - config/index.md
        - features/index.md
        - games/index.md
        - contributing/index.md
      #
      # Mermaid diagrams require headless Chrome. Disabled by default.
      # To enable locally: render_js: true  (requires chromium in PATH)
      render_js: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FujiNetWIFI
    - icon: fontawesome/brands/discord
      link: https://discord.gg/7MfFTvD
#  analytics:
#    provider: google
#    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - What is FujiNet?: what-is-fujinet.md
  - Getting Started:
    - getting-started/index.md
    - Atari 8-bit: getting-started/atari-8bit.md
    - Apple II: getting-started/apple-ii.md
    - Coleco ADAM: getting-started/coleco-adam.md
    - Commodore 64: getting-started/commodore-64.md
    - Color Computer (CoCo): getting-started/coco.md
    - "CoCo: The Basics": getting-started/coco-basics.md
  - Using CONFIG:
    - config/index.md
    - Atari 8-bit: config/atari-8bit.md
    - Apple II: config/apple-ii.md
    - Coleco ADAM: config/coleco-adam.md
    - Commodore 64: config/commodore-64.md
    - Color Computer (CoCo): config/coco.md
  - Features:
    - features/index.md
    - Virtual Disk Drives: features/disk-drives.md
    - Network Device (N:): features/network-device.md
    - Modem & BBS: features/modem.md
    - Printer Emulation: features/printer.md
    - Network Clock: features/clock.md
    - TNFS File Servers: features/tnfs.md
  - Apps:
    - apps/index.md
  - Games:
    - games/index.md
    - Multiplayer Games: games/multiplayer.md
    - High Score Games: games/high-scores.md
  - Contributing:
    - contributing/index.md
    - Adding a New Platform: contributing/new-platform.md
